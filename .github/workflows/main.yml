name: Daily Dividend Update

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 KST 08:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요 라이브러리 설치
        run: pip install requests pytz

      - name: 파이썬 스크립트 실행 (데이터 수집)
        run: python update_shares.py

      - name: 변경된 데이터를 깃허브에 push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          
          # 변경사항이 없으면 조용히 종료
          if git diff --staged --quiet; then
            echo "변경 없음"
            exit 0
          fi
          
          git commit -m "Update daily dividend data"
          
          # 원격 저장소와 강제로 싱크를 맞춘 후 push (에러 방지)
          git fetch origin main
          git rebase origin/main
          git push origin main
