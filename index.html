<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 월간 고배당률 TOP 리스트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 950px; margin: 40px auto; padding: 0 20px; background-color: #f9f9f9; }
        h1 { color: #333; text-align: center; margin-bottom: 5px; }
        .update-time { text-align: right; color: #666; font-size: 0.9rem; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: white; }
        .badge-kr { background-color: #28a745; }
    </style>
</head>
<body>

    <h1>📅 글로벌 월간 고배당률 TOP 리스트</h1>
    <div class="update-time" id="update-time">업데이트 중...</div>

    <table>
        <thead>
            <tr>
                <th>순위</th>
                <th>시장</th>
                <th>티커/코드</th>
                <th>종목명</th>
                <th>현재가</th>
                <th>1년 상승률</th>
                <th>월 배당금</th>
            </tr>
        </thead>
        <tbody id="dividend-table">
            <tr><td colspan="7">데이터를 불러오는 중입니다...</td></tr>
        </tbody>
    </table>

    <script>
        fetch('data.json?v=' + String(new Date().getTime()))
            .then(response => response.json())
            .then(data => {
                document.getElementById('update-time').innerText = `최근 업데이트: ${data.updated_at || ''}`;
                const tbody = document.getElementById('dividend-table');
                tbody.innerHTML = '';

                data.list.forEach((item, index) => {
                    const marketBadge = '<span class="badge badge-kr">한국</span>';
                    const returnVal = item.return_1y || '+0.00%';
                    const returnColor = returnVal.includes('-') ? 'color: #007bff;' : 'color: #d9534f; font-weight: bold;';

                    const row = `<tr>
                        <td>${index + 1}</td>
                        <td>${marketBadge}</td>
                        <td><strong>${item.ticker}</strong></td>
                        <td style="text-align: left;">${item.name}</td>
                        <td>${item.price}</td>
                        <td style="${returnColor}">${returnVal}</td>
                        <td style="color: #28a745; font-weight: bold;">${item.dividend}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            })
            .catch(err => {
                document.getElementById('dividend-table').innerHTML = `<tr><td colspan="7">데이터를 불러오지 못했습니다.</td></tr>`;
            });
    </script>
</body>
</html>
