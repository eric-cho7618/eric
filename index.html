<table>
        <thead>
            <tr>
                <th>순위</th>
                <th>시장</th>
                <th>티커/코드</th>
                <th>종목명</th>
                <th>현재가</th>
                <th>1년 상승률</th>
                <th>월 배당금</th>
            </tr>
        </thead>
        <tbody id="dividend-table">
            <tr><td colspan="7">데이터를 불러오는 중입니다...</td></tr>
        </tbody>
    </table>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('update-time').innerText = `최근 업데이트: ${data.updated_at}`;
                const tbody = document.getElementById('dividend-table');
                tbody.innerHTML = '';

                data.list.forEach((item, index) => {
                    const marketBadge = item.market === 'US' 
                        ? '<span class="badge badge-us">미국</span>' 
                        : '<span class="badge badge-kr">한국</span>';

                    // 상승률 색상 분기 처리 (플러스면 빨간색, 마이너스면 파란색)
                    const returnColor = item.return_1y.includes('-') ? 'color: #007bff;' : 'color: #d9534f; font-weight: bold;';

                    const row = `<tr>
                        <td>${index + 1}</td>
                        <td>${marketBadge}</td>
                        <td><strong>${item.ticker}</strong></td>
                        <td style="text-align: left;">${item.name}</td>
                        <td>${item.price}</td>
                        <td style="${returnColor}">${item.return_1y}</td>
                        <td style="color: #28a745; font-weight: bold;">${item.dividend}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            })
            .catch(err => {
                document.getElementById('dividend-table').innerHTML = `<tr><td colspan="7">데이터를 불러오지 못했습니다.</td></tr>`;
            });
    </script>
